<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KENTRAS DISPLAY</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: "Noto Sans JP", sans-serif;
}

#lcd {
  width: 100%;
  height: 100vh;
  border: none;
}
  #notice {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  
  background: black;
  color: #00ffcc;
  padding: 10px 30px;
  font-size: 28px;
  letter-spacing: 4px;
  
  opacity: 0;
  animation: floatIn 4s infinite;
}

@keyframes floatIn {
  0% {
    opacity: 0;
    transform: translate(-50%, 20px);
  }
  20% {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  60% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -20px);
  }
}
</style>

</head>
<body>

<!-- 発車標SVG表示枠 -->
<img id="lcd" src="assets/svg/A27千葉.svg">

<script>
// 仮：駅切替関数
function showStation(file) {
  document.getElementById("lcd").src =
    "assets/svg/" + file + ".svg";
}
  <div id="notice">電車がまいります</div>

// テスト（3秒後に切替）
setTimeout(() => {
  showStation("A14東菅野");
}, 3000);
  setTimeout(() => {
  showStation("A14東菅野");
  document.getElementById("notice").style.display = "block";
}, 3000);
</script>

</body>
</html>
