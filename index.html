<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KENTRAS INTERACTIVE</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: "Noto Sans JP", sans-serif;
  overflow: hidden;
}

/* 発車標 */
#lcd {
  width: 100%;
  height: 100vh;
  display: block;
  background: black;
}

/* 上部バー */
#header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  background: #111;
  color: #aaa;
  padding: 8px 16px;
  font-size: 14px;
}

/* 電車がまいります */
#notice {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: #00ffcc;
  padding: 12px 36px;
  font-size: 28px;
  border: 2px solid #00ffcc;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

/* ボタンパネル */
#panel {
  position: absolute;
  right: 20px;
  top: 60px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

button {
  background: #111;
  color: #00ffcc;
  border: 1px solid #00ffcc;
  padding: 8px 12px;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
  color: black;
}

/* フェード */
.fade {
  animation: fade 0.4s;
}

@keyframes fade {
  0% { opacity: 0.2; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div id="header">KENTRAS INTERACTIVE DISPLAY</div>

<!-- 発車標 -->
<img id="lcd" src="assets/svg/A27千葉.svg">

<!-- 放送 -->
<div id="notice">電車がまいります</div>

<!-- 操作パネル -->
<div id="panel">
  <button onclick="go('A01東京')">A01 東京</button>
  <button onclick="go('A14東菅野')">A14 東菅野</button>
  <button onclick="go('A27千葉')">A27 千葉</button>
  <button onclick="go('A35茂原')">A35 茂原</button>
</div>

<script>

const lcd = document.getElementById("lcd");
const notice = document.getElementById("notice");

/* 完全版：巨大SVGでも破綻しないプリロード方式 */
function go(station) {

  // フェードをリセット
  lcd.classList.remove("fade");

  // 新しい画像をプリロード
  const img = new Image();
  img.src = "assets/svg/" + station + ".svg";

  img.onload = () => {

    // 読み込み完了後に差し替え
    lcd.src = img.src;

    // フェード開始
    void lcd.offsetWidth;
    lcd.classList.add("fade");

    // 放送表示
    notice.style.opacity = 1;
    setTimeout(() => {
      notice.style.opacity = 0;
    }, 2000);
  };
}

</script>

</body>
</html>
